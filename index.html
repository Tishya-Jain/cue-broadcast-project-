
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUE Platform</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/LzKdB859/CUE-Logo-without-bg-03-1.png" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              navy: {
                DEFAULT: "#121826", // Updated to new nav color
                light: "#233352"
              },
              ivory: {
                DEFAULT: "#FAFBF8",
                muted: "rgba(250, 251, 248, 0.6)"
              },
              lemon: "#DEFC16",
              sky: "#97B9FE",
              glass: "rgba(255, 255, 255, 0.05)",
            },
            animation: {
              'slide-down': 'slideDown 0.3s ease-out',
            },
            keyframes: {
              slideDown: {
                '0%': { transform: 'translateY(-10px)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0B0E14; /* Updated Main Background */
        color: #FAFBF8;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
